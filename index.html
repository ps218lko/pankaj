<script>
window.onload = function () {

  const form = document.getElementById("entryForm");

  // SAFETY CHECK (THIS PREVENTS BLANK PAGE)
  if (!form) {
    console.error("FORM NOT FOUND - CHECK ID entryForm");
    document.body.innerHTML = "<h2 style='color:red'>Form Not Found</h2>";
    return;
  }

  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxVE3fbiOQPURdJvdC3gNajeqhlNnZAPckJOcjqEzQZ7dvtxV4jZJdlO4g37fOdisJV-w/exec";

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = Object.fromEntries(new FormData(form));

    try {
      await fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
      });

      alert("Saved Successfully!");
      form.reset();

    } catch (err) {
      console.error(err);
      alert("Submit Failed");
    }
  });

  console.log("Script Loaded Successfully");
};
</script>
